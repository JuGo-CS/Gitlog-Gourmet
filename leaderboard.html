<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>GITLOG GOURMET</title>
</head>
<body class="leaderboard-page">
    <div id="aspect-ratio-wrapper">
        <div id="game-container">

            <header>
                <!-- User badge -->
                <div id="user-badge" onclick="toggleUserDropdown()">
                    <div class="avatar">G</div>
                    <span class="username-display" id="username-display-text">Guest</span>
                    <span class="dropdown-arrow">&#9660;</span>
                    <div id="user-dropdown">
                        <div class="dropdown-item" onclick="event.stopPropagation(); openUsernameModal();">
                            <span class="item-icon">&#128100;</span> Switch Account
                        </div>
                        <div class="dropdown-item" onclick="event.stopPropagation(); window.location.href='home.html'">
                            <span class="item-icon">&#128682;</span> Log Out
                        </div>
                    </div>
                </div>

                <img id="game-logo" src="assets/images/game-logo.png">
                <img id="gitlog_text_logo" src="assets/images/Gitlog Horizontal.png">

                <nav>
                    
                    <a href="home.html">
                        <img id="arrow_goHome" src="assets/images/arrow_firstStyle.png" alt="Home">
                    </a>
                    <!-- <a href="home.html">
                        <img src="https://img.freepik.com/free-psd/black-question-mark-painted-texture-3d-render-uncertainty-concept_632498-24351.jpg?semt=ais_hybrid&w=740" alt="Tutorial">
                    </a> -->
                </nav>
            </header>
            <main>
                <div id="leaderboard-content">
                    <div id="leaderboard-switch-button-container">
                        <button id="leaderboard-game1-switch" onclick="selectBoard(1)">MATCHING PAIR</button>
                        <button id="leaderboard-game2-switch" onclick="selectBoard(2)">CODE BREAKER</button>
                    </div>
                    <div id="leaderboard-table-container">
                        <input type="radio" name="active-board" id='game1-radio' checked>
                        <table id="game1-board">
                            <thead>
                                <tr>
                                    <th>RANK</th>
                                    <th>NAME</th>
                                    <th>RATING</th>
                                    <th>SCORE</th>
                                </tr>
                            </thead>
                            <tbody id="leaderboard-game1-body">
                                
                            </tbody>
                        </table>

                        <input type="radio" name="active-board" id='game2-radio'>
                        <table id="game2-board">
                            <thead>
                                <tr>
                                    <th>RANK</th>
                                    <th>NAME</th>
                                    <th>RATING</th>
                                    <th>SCORE</th>
                                </tr>
                            </thead>
                            <tbody id="leaderboard-game2-body">
                                
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>

            <hr id="horizontal-line">

            <footer>
                <p>@2025 Gitlog Gourmet Web App ~ The GITLOG. All rights reserved.</p>
            </footer>
        </div>


        <div id="blackBackground"></div>
        <div id="whiteFadeIn_game"></div>
        <ul class="background">
            <li><img src="assets/tile-entity/0.png"></li>
            <li><img src="assets/tile-entity/1.png"></li>
            <li><img src="assets/tile-entity/10.png"></li>
            <li><img src="assets/tile-entity/11.png"></li>
            <li><img src="assets/tile-entity/12.png"></li>
            <li><img src="assets/tile-entity/13.png"></li>
            <li><img src="assets/tile-entity/14.png"></li>
            <li><img src="assets/tile-entity/15.png"></li>
            <li><img src="assets/tile-entity/15.png"></li>
            <li><img src="assets/tile-entity/16.png"></li>

        </ul>

        

    </div>
    <!-- Username Modal -->
    <div id="username-overlay">
        <div id="username-modal">
            <h2>&#127858; Welcome to Gitlog Gourmet!</h2>
            <p class="subtitle">Enter your username to start playing</p>
            <div class="input-group">
                <input type="text" id="username-input" placeholder="Enter username..." maxlength="20" autocomplete="off">
                <button class="btn-primary" onclick="handleUsernameSubmit()">Let's Go!</button>
            </div>
            <div class="error-msg" id="username-error"></div>
            <div class="saved-accounts-title">&#128195; Saved Accounts</div>
            <div id="saved-accounts-list"></div>
        </div>
    </div>

    <script src="username-manager.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="leaderboard-script.js"></script>
</body>
</html>
